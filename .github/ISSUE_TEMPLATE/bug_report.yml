name: Bug Report
description: Report a problem with a module, script, or documentation
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Be as specific as you can — the more detail, the faster it gets fixed.

  - type: input
    id: module
    attributes:
      label: Module
      description: Which module or file has the problem? (e.g., OB-1.2, SYLLABUS.md, docs/index.html)
      placeholder: e.g., OB-1.2 — Quantization Trade-offs
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect to happen vs. what actually happened?
      placeholder: |
        Expected: ...
        Got: ...
    validations:
      required: true

  - type: textarea
    id: hardware
    attributes:
      label: Hardware / OS
      description: GPU, VRAM, OS, Ollama version
      placeholder: |
        GPU: RTX 3070 (8GB VRAM)
        OS: Ubuntu 22.04
        Ollama: 0.3.x
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
    validations:
      required: false
